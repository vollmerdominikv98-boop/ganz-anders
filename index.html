<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Open Tool Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-p-6">
    <div class="max-w-4xl mx-auto p-6">
        <header class="mb-8 border-b border-slate-800 pb-4">
            <h1 class="text-3xl font-bold tracking-tight text-emerald-400">CNC Open Tool Guide</h1>
            <p class="text-slate-400">Herstellerunabhängiger Rechner für das CNC-Fräsen</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Eingabefelder -->
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                <h2 class="text-xl font-semibold mb-4 text-slate-200">Parameter</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Schnittgeschwindigkeit vc (m/min)</label>
                        <input type="number" id="vc" value="200" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Fräserdurchmesser D (mm)</label>
                        <input type="number" id="diameter" value="12" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Vorschub pro Zahn fz (mm)</label>
                        <input type="number" step="0.01" id="fz" value="0.08" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Anzahl Zähne z</label>
                        <input type="number" id="z" value="4" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Schnitttiefe ap (mm)</label>
                        <input type="number" id="ap" value="5" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Schnittbreite ae (mm)</label>
                        <input type="number" id="ae" value="4" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white">
                    </div>
                </div>
            </div>

            <!-- Ergebnisse -->
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-semibold mb-4 text-slate-200">Berechnete Werte</h2>
                    <div class="space-y-4">
                        <div class="bg-slate-950 p-4 rounded border border-slate-800">
                            <span class="text-sm text-slate-400">Drehzahl (n):</span>
                            <div id="res-rpm" class="text-2xl font-bold text-emerald-400">-- U/min</div>
                        </div>
                        <div class="bg-slate-950 p-4 rounded border border-slate-800">
                            <span class="text-sm text-slate-400">Tischvorschub (vf):</span>
                            <div id="res-vf" class="text-2xl font-bold text-emerald-400">-- mm/min</div>
                        </div>
                        <div class="bg-slate-950 p-4 rounded border border-slate-800">
                            <span class="text-sm text-slate-400">Zeitspanvolumen (Q):</span>
                            <div id="res-q" class="text-2xl font-bold text-emerald-400">-- cm³/min</div>
                        </div>
                    </div>
                </div>
                <div class="text-xs text-slate-500 mt-6 text-center">
                    Basiert auf mathematischen Formeln für das Fräsen
                </div>
            </div>
        </div>
    </div>

    <script>
        // Einfache lokale Testberechnung im Browser zur Ansicht
        function calculate() {
            const vc = parseFloat(document.getElementById('vc').value) || 0;
            const D = parseFloat(document.getElementById('diameter').value) || 1;
            const fz = parseFloat(document.getElementById('fz').value) || 0;
            const z = parseInt(document.getElementById('z').value) || 1;
            const ap = parseFloat(document.getElementById('ap').value) || 0;
            const ae = parseFloat(document.getElementById('ae').value) || 0;

            const n = (vc * 1000) / (Math.PI * D);
            const vf = fz * z * n;
            const Q = (ap * ae * vf) / 1000;

            document.getElementById('res-rpm').innerText = n.toFixed(2) + " U/min";
            document.getElementById('res-vf').innerText = vf.toFixed(2) + " mm/min";
            document.getElementById('res-q').innerText = Q.toFixed(2) + " cm³/min";
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', calculate);
        });

        calculate();
    </script>
</body>
</html>
